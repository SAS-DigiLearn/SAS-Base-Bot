<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base-Bot</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>

<style>

body {
  font-family: Arial;
  background:#f8f9fa;
  padding:10px;
}

#chatbox{
  background:white;
  max-width:800px;
  margin:auto;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.message{
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:1px solid #dee2e6;
}

.bot{
  background:#FCE8F2;
  margin-right:10%;
}

.user{
  background:#e9ecef;
  margin-left:10%;
  text-align:right;
}

button{
  padding:8px 15px;
  background:#b91e71;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

input{
  padding:10px;
  width:70%;
  border-radius:5px;
  border:1px solid #ccc;
}

.tip-image{
  max-width:100%;
  border-radius:8px;
  margin-top:6px;
}


.sop-table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 8px;
}

.sop-table th,
.sop-table td {
  border: 1px solid #ccc;
  padding: 6px;
}

.sop-table th {
  background: #f1f3f5;
}

.sop-table tr:nth-child(even) {
  background: #fafafa;
}

/* Add spacing and indentation for lists */
.message ul,
.message ol {
  margin: 5px 0;
  padding-left: 20px; 
  list-style-position: inside; 
}

.message li {
  margin-bottom: 4px;
}


.img-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  padding-top: 40px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.85);
}

.modal-content {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.tip-image {
  cursor: pointer;
  transition: transform 0.2s ease;
}

.tip-image:hover {
  transform: scale(1.01);
}
  
#refreshBtn {
  padding:8px 15px;
  background:#b91e71;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#refreshBtn:hover {
  opacity:0.9;
}
</style>
</head>

<body>

<div id="chatbox">

<div class="message bot" id="introMessage">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span>Howdy, I'm <b>Alexa-Bot</b>. What can I help you with today?</span>
       
  </div>
</div>

<div id="messages"></div>

<input id="userInput" placeholder="Type your question">
<button onclick="handleUserQuestion()">Send</button>
 <button id="refreshBtn" onclick="refreshChat()" style="display:none;">Refresh</button>
</div>

<script>


let knowledge=[];
let fuse;

function refreshChat(){
  location.reload();
}

/* ---------- SYNONYM MAP ---------- */

const synonyms={
  login:["log in","sign in","signin"],
  password:["passcode","credential"],
  reset:["change","update","recover"],
  account:["profile","user"]
};

/* ---------- EXPAND QUERY ---------- */

function expandQuery(query){
  let words=query.toLowerCase().split(/\s+/);
  let expanded=[...words];

  words.forEach(w=>{
    if(synonyms[w]){
      expanded.push(...synonyms[w]);
    }
  });

  return expanded.join(" ");
}

/* ---------- LOAD KNOWLEDGE ---------- */

async function loadKnowledge(){
  const res=await fetch("./data/knowledge.json");
  knowledge=await res.json();

  fuse=new Fuse(knowledge,{
    keys:["content","keywords"],
    threshold:0.35,
    includeScore:true,
    ignoreLocation:true
  });
}

loadKnowledge();

/* ---------- UI HELPERS ---------- */

/* Updated appendMessage to preserve safe HTML formatting including lists and tables */
function appendMessage(htmlContent,sender){
  const msg=document.createElement("div");
  msg.className="message "+sender;

  const allowedTags = [
    'b','i','em','strong',
    'ul','ol','li','p','br',
    'table','thead','tbody','tr','th','td',
    'img'
  ];

msg.innerHTML = DOMPurify.sanitize(htmlContent,{
  ALLOWED_TAGS: allowedTags,
  ALLOWED_ATTR: ['src','class','alt']
});

// 👇 ADD THIS BLOCK
setTimeout(() => {
  const images = msg.querySelectorAll("img");

  images.forEach(img => {
    img.onclick = () => openModal(img.src);
  });
}, 0);
  document.getElementById("messages").appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

/* ---------- SEARCH ---------- */

function handleUserQuestion() {
  const input = document.getElementById("userInput");
  const query = input.value.trim();
  if (!query) return;

  // Show the refresh button after first question
  const btn = document.getElementById("refreshBtn");
  if (btn.style.display === "none") {
    btn.style.display = "inline-block";
  }

  appendMessage(query, "user");
  input.value = "";

  /* ---------- PREPROCESS QUERY ---------- */
  // Remove common conversational words and stopwords
  const stopwords = new Set([
    "the","and","for","are","with","that","this","from","your",
    "have","will","into","you","can","not","use","how","when",
    "tell","me","about","what","is","of","do","i","please"
  ]);

  const cleanedWords = query
    .toLowerCase()
    .replace(/[^\w\s]/g,"")
    .split(/\s+/)
    .filter(w => !stopwords.has(w));

  // Expand synonyms
  let expandedWords = [...cleanedWords];
  cleanedWords.forEach(w => {
    if (synonyms[w]) {
      expandedWords.push(...synonyms[w]);
    }
  });

  const expandedQuery = expandedWords.join(" ");

  /* ---------- SEARCH WITH FUSE ---------- */
  const results = fuse.search(expandedQuery, {
    threshold: 0.45,        // slightly higher to tolerate extra words
    ignoreLocation: true,
    includeScore: true
  }).slice(0,3).map(r => r.item);

  /* ---------- HANDLE NO RESULTS ---------- */
  if (results.length === 0) {
    appendMessage("Sorry, I couldn't find anything related.", "bot");
    return;
  }

  /* ---------- DISPLAY RESULTS ---------- */
  results.forEach((result, i) => {
    appendMessage(`
      <div>
        <p><b>Result ${i+1}</b></p>
        ${result.content}
        <br>
        <small><b>${result.filename}</b></small>
      </div>
    `, "bot");
  });
}

/* ---------- ENTER KEY ---------- */

document.getElementById("userInput")
.addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    handleUserQuestion();
  }
});
function openModal(src){
  const modal = document.getElementById("imgModal");
  const modalImg = document.getElementById("modalImg");

  modal.style.display = "block";
  modalImg.src = src;
}

function closeModal(){
  document.getElementById("imgModal").style.display = "none";
}
</script>
<div id="imgModal" class="img-modal" onclick="closeModal()">
  <img id="modalImg" class="modal-content">
</div>
</body>
</html>
